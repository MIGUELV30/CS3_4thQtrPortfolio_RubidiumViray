<!DOCTYPE html>
<html>

<head>
    <title>Movie</title>
<link rel="stylesheet" href="q41stgraded.css">
</head>

<body>


<form id="addmovie">

    <h2>Add a Movie</h2>

    <label>Title:</label>
    <input type ="text" id ="title" required>

    <label> Year:</label>
    <input type = "text" id ="year" required>

    <label for ="genre"> Genre: </label>
    <select name ="genres" id = "genre">
        <option value ="Action"> Action </option>
        <option value ="Horror"> Horror </option>
        <option value ="Romance"> Romance </option>
        <option value ="Comedy"> Comedy </option>
        <option value ="Drama"> Drama </option>
    </select>

    <label>Rating:</label>
    <div id ="stars">
        <span class = "star" data-value="1">★</span>
        <span class = "star" data-value="2">★</span>
        <span class = "star" data-value="3">★</span>
        <span class = "star" data-value="4">★</span>
        <span class = "star" data-value="5">★</span>
    </div>

    <button type ="submit">Add Movie</button>
</form>
<h3>Movie List</h3>
<ul id="movieList"></ul>
<script>
let rating = 0;
 const stars = document.querySelectorAll(".star");

 stars.forEach(star => {
    star.addEventListener("click", function(){
       
        rating = this.dataset.value;
        stars.forEach(s => s.classList.remove("active"));
        for (let i = 0; i < rating; i++) {
            stars[i].classList.add("active");
        }
    });
 })

    
 
 
 const addmovielist = document.getElementById("movieList");
 const form = document.getElementById("addmovie");
 
 form.addEventListener("submit", function(e){
    e.preventDefault() // change to e if not alternative
    const title = document.getElementById("title").value;
    const year = document.getElementById("year").value;
    const genre = document.getElementById("genre").value;
   
    
    let movies = JSON.parse(localStorage.getItem("movies")) || [];
    const movie2 = movies.find(m => m.title.toLowerCase() === title.toLowerCase());

    if (movie2){
        movie2.genre = genre;
        movie2.year = year;

        movie2.rating = Math.round((Number(movie2.rating) + Number(rating)) / 2);

    } else {
        const movie = {
        title: title, 
        year: year, 
        genre: genre, 
        rating: rating
    };
    

    movies.push(movie);
}
    localStorage.setItem("movies", JSON.stringify(movies));
    
    movielistdisplay();

    form.reset();

 });

  function movielistdisplay(){
    addmovielist.innerHTML = "";

    const movies = JSON.parse(localStorage.getItem("movies")) || [];

    movies.forEach((movie, index) => {
        const li = document.createElement("li");

        li.innerHTML =
       `${movie.title} (${movie.year}) - ${movie.genre}, Rating: ${"★".repeat(movie.rating)}<button onclick ="deletemovie(${index})">Delete</button>`;


       addmovielist.appendChild(li);

    });

}
    
    function deletemovie(index){
        let deletemessage = confirm("Are you sure you want to delete?");

        if(deletemessage){
            let movies = JSON.parse(localStorage.getItem("movies")) || [];
            movies.splice(index,1);
            localStorage.setItem("movies", JSON.stringify(movies));
            movielistdisplay();
        }
    }

movielistdisplay();

</script>
</body>
